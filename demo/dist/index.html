<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SAVR | Advanced Volatility Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-CQhmbh_H.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C3fP8Dkl.css">
</head>
<body class="theme-dark">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-wrapper">
        <aside class="sidebar glass">
            <div class="brand">
                <div class="logo">Σ</div>
                <h2>RK-SAVR</h2>
            </div>
            
            <nav class="config-panel">
                <div class="section-title">Data Simulation</div>
                <div class="input-group">
                    <label>True Hurst ($H_0$)</label>
                    <div class="range-with-value">
                        <input type="range" id="hurstInput" min="0.01" max="0.99" step="0.01" value="0.10">
                        <span class="value-tag" id="hurstValue">0.10</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Path Length</label>
                    <input type="number" id="lengthInput" value="2048" class="neon-input">
                </div>

                <div class="divider"></div>

                <div class="section-title">Estimation Logic</div>
                <div class="input-group">
                    <label>Window Size ($\nu$)</label>
                    <input type="number" id="windowInput" value="512" class="neon-input">
                </div>
                <div class="input-group">
                    <label>Sample Size ($T$)</label>
                    <input type="number" id="sampleInput" value="500" class="neon-input">
                </div>
                <div class="input-group">
                    <label>Iterations ($K$)</label>
                    <input type="number" id="iterInput" value="16" class="neon-input">
                </div>

                <button id="runBtn" class="primary-action">
                    <span class="btn-text">Run Analysis</span>
                    <div class="btn-glow"></div>
                </button>
            </nav>

            <div class="progress-container hidden" id="progressBox">
                <div class="progress-label">Processing Windows...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </aside>

        <main class="content">
            <header class="top-nav glass">
                <div class="status-indicators">
                    <div class="indicator">
                        <span class="dot" id="statusDot"></span>
                        <span id="statusText">System Idle</span>
                    </div>
                </div>
                <div class="metric-cards">
                    <div class="metric">
                        <span class="m-label">Avg Estimate</span>
                        <span class="m-value" id="avgHDisplay">--</span>
                    </div>
                    <div class="metric">
                        <span class="m-label">Mean Error</span>
                        <span class="m-value" id="errorHDisplay">--</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-grid">
                <div class="card glass chart-card full-width">
                    <div class="card-header">
                        <h3>Volatility Trajectory (fBm Path)</h3>
                        <div class="card-actions">
                            <span class="badge">Live Generation</span>
                        </div>
                    </div>
                    <div id="seriesChart" class="chart-box"></div>
                </div>

                <div class="card glass chart-card full-width">
                    <div class="card-header">
                        <h3>Roughness Estimation Profile</h3>
                        <div class="card-actions">
                            <span class="badge accent">RK-SAVR Pipeline</span>
                        </div>
                    </div>
                    <div id="resultsChart" class="chart-box"></div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
